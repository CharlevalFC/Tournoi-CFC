<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournois CFC — Charleval Football Club</title>
<style>
:root{
  --or:#E8650A;--ord:#B84E06;--orl:#FEF0E6;--orm:#F97316;--orb:#7C2D12;
  --brd:#e8d5c0;--bg:#faf7f3;--card:#fff;
  --tx:#1a1208;--tx2:#6b4f2a;--tx3:#a07850;
  --rad:10px;--rads:6px;--radi:4px;
}
body.dark{
  --or:#F97316;--ord:#EA580C;--orl:#431407;--orb:#FED7AA;
  --brd:#3a2a1a;--bg:#1a110a;--card:#231508;--tx:#f5e6d3;--tx2:#c8a882;--tx3:#8a6a4a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}

.topbar{background:#1a1208;color:#fff;display:flex;align-items:center;justify-content:space-between;height:56px;border-bottom:3px solid var(--or);padding:0 16px;gap:8px}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-img{width:38px;height:38px;object-fit:contain}
.topbar-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;display:flex;align-items:center;gap:4px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;display:inline-block}
.status-dot.off{background:#888;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,.22)}
.tb-btn.logout{background:rgba(200,50,50,.25);border-color:rgba(255,100,100,.35);color:#fca5a5}
.admin-bar{background:#7C2D12;padding:6px 16px;font-size:12px;color:#FED7AA;display:flex;align-items:center;justify-content:space-between;font-weight:500}
.saving-ind{font-size:11px;color:var(--orm);opacity:0;transition:opacity .3s;font-weight:600}
.saving-ind.show{opacity:1}

.t-tabs{background:#2d1f0a;border-bottom:1px solid rgba(232,101,10,.25);display:flex;overflow-x:auto;padding:0 12px}
.t-tab{padding:11px 16px;font-size:13px;font-weight:700;color:rgba(255,255,255,.4);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
.t-tab.active{color:var(--or);border-bottom-color:var(--or)}

.s-tabs{display:flex;gap:6px;padding:12px 14px 0;max-width:1400px;margin:0 auto;flex-wrap:wrap}
.s-tab{padding:6px 14px;font-size:12px;font-weight:600;color:var(--tx2);border:1px solid var(--brd);background:var(--card);border-radius:20px;cursor:pointer}
.s-tab.active{background:var(--orl);border-color:var(--or);color:var(--orb)}

.main{padding:14px;max-width:1400px;margin:0 auto}
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.groups-grid{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden}
.card-head{padding:9px 13px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to right,var(--orl),var(--card))}
.card-title{font-size:13px;font-weight:800;color:var(--orb);text-transform:uppercase;letter-spacing:.04em}
.terrain-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 7px;border-radius:4px;background:var(--or);color:#fff;font-size:10px;font-weight:800;margin-left:6px}
.card-actions{display:flex;gap:5px}
.icon-btn{background:none;border:1px solid var(--brd);border-radius:var(--rads);padding:3px 8px;font-size:11px;cursor:pointer;color:var(--tx2);font-weight:600}
.icon-btn:hover{background:var(--orl);border-color:var(--or);color:var(--orb)}
.card-body{padding:11px 13px}

.stand-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.stand-table th{color:var(--tx3);font-weight:700;font-size:10px;padding:3px 6px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.stand-table th.tl{text-align:left}
.stand-table td{padding:7px 6px;border-top:1px solid #f3e8d8;text-align:center;vertical-align:middle}
.stand-table td.tl{text-align:left;padding-left:10px}
.stand-table tr:first-child td{border-top:none}
body.dark .stand-table td{border-top-color:#2a1a0a}
.pos-num{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:800}
.pos-td{padding:7px 16px 7px 6px !important}
.logo-td{padding:7px 16px !important}
.p1{background:var(--or);color:#fff}.p2{background:#d4d4d4;color:#222}
.p3{background:#cd7f32;color:#fff}.p4{background:#f3e8d8;color:var(--tx3)}
body.dark .p4{background:#2a1a0a}
.team-name-td{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;cursor:pointer;padding-left:16px !important}
.pts-td{font-weight:800;color:var(--ord);font-size:13px}
.diff-pos{color:#15803d;font-weight:700}.diff-neg{color:#dc2626;font-weight:700}
.qualify-sep td{padding:0;border:none}
.qualify-line{height:2px;background:var(--or);margin:2px 0}
.tab-badge{font-size:9px;background:var(--orl);color:var(--orb);border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:800}
.my-badge{font-size:9px;background:var(--or);color:#fff;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:800}
.club-logo{width:20px;height:20px;border-radius:3px;object-fit:contain}
.logo-add{width:20px;height:20px;border-radius:3px;background:var(--orl);border:1px dashed var(--or);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--or);cursor:pointer}

.matches-section{margin-top:9px;border-top:1px solid #f3e8d8;padding-top:3px}
body.dark .matches-section{border-top-color:#2a1a0a}
.sec-lbl{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:5px 0 2px}
.match-row{display:grid;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #f3e8d8}
.match-row:last-child{border-bottom:none}
body.dark .match-row{border-bottom-color:#2a1a0a}
.match-view{grid-template-columns:40px 1fr 56px 1fr}
.match-edit{grid-template-columns:52px 1fr 28px 8px 28px 50px 1fr}
.m-time{font-size:11px;color:var(--tx3);text-align:center;font-weight:600}
.m-time-in{width:50px;height:26px;text-align:center;font-size:11px;border:1px solid var(--brd);border-radius:var(--radi);background:var(--card);color:var(--tx);font-family:inherit;padding:0 3px}
.m-time-in:focus{outline:none;border-color:var(--or)}
.m-team{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.m-team-l{text-align:right}.m-team-r{text-align:left}
.m-team.win{color:var(--ord);font-weight:800}
.m-team.mine{font-weight:800;color:var(--or)}
.score-box{text-align:center;font-weight:800;font-size:13px;background:#f3e8d8;border-radius:5px;padding:2px 5px}
.score-box.np{color:var(--tx3);font-weight:400;font-size:11px;background:none}
body.dark .score-box{background:#2a1a0a}
.s-in{width:28px;height:28px;text-align:center;font-size:13px;font-weight:700;border:1px solid var(--brd);border-radius:var(--radi);background:var(--card);color:var(--tx)}
.s-in:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 2px rgba(232,101,10,.15)}
.sep{text-align:center;color:var(--tx3);font-size:11px;font-weight:700}
.forf-btn{font-size:10px;padding:2px 5px;border:1px solid var(--brd);border-radius:4px;background:var(--card);color:var(--tx3);cursor:pointer;font-weight:700;white-space:nowrap}
.forf-btn.active{background:var(--or);color:#fff;border-color:var(--or)}

.tab-zone{background:var(--orl);border:1px solid #f5c28a;border-radius:var(--rads);padding:7px 10px;margin-top:7px}
.tab-zone-title{font-size:11px;font-weight:800;color:var(--orb);margin-bottom:4px}
.tab-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:12px}
.tab-in{width:28px;height:24px;text-align:center;font-size:12px;border:1px solid #f5c28a;border-radius:var(--radi);background:#fff;color:var(--tx)}

.b-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:680px){.b-grid{grid-template-columns:1fr}}
.b-round-title{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;padding-bottom:5px;border-bottom:2px solid var(--or)}
.b-match{border:1px solid var(--brd);border-radius:var(--rads);overflow:hidden;margin-bottom:7px}
body.dark .b-match{background:var(--card);border-color:var(--brd)}
.b-team{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;font-size:12px;gap:6px;font-weight:500}
.b-team+.b-team{border-top:1px solid #f3e8d8}
body.dark .b-team+.b-team{border-top-color:#2a1a0a}
.b-team.win{background:var(--orl);font-weight:800;color:var(--orb)}
.b-score{font-weight:800;color:var(--tx2);min-width:16px;text-align:right}
.b-lbl{font-size:10px;color:var(--tx3);padding:3px 10px;border-top:1px solid #f3e8d8;background:#faf7f3;font-weight:500}
body.dark .b-lbl{background:var(--bg);border-color:#2a1a0a}
.peno-row{display:flex;align-items:center;gap:7px;padding:5px 10px;background:var(--orl);font-size:12px}
.peno-lbl{color:var(--orb);font-weight:700;flex:1}

.cls-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid #f3e8d8;font-size:12px}
body.dark .cls-row{border-bottom-color:#2a1a0a}
.cls-pos{width:24px;text-align:center;font-weight:800}
.cls-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

.myteam-bar{background:var(--orl);border:1px solid var(--or);border-radius:var(--rads);padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;flex-wrap:wrap}
.myteam-close{margin-left:auto;cursor:pointer;font-size:16px;color:var(--or);flex-shrink:0}

.share-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1208;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;border:1px solid var(--or);animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.pdf-btn{padding:7px 14px;background:var(--or);color:#fff;border:none;border-radius:var(--rads);font-size:12px;font-weight:700;cursor:pointer;margin-top:12px}
.pdf-btn:hover{background:var(--ord)}
@media print{.topbar,.t-tabs,.s-tabs,.card-actions,.admin-bar,.tb-btn,.pdf-btn,button{display:none!important}.card{break-inside:avoid}}

.info-stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.info-stab{padding:7px 14px;font-size:12px;font-weight:600;color:var(--tx2);border:1px solid var(--brd);background:var(--card);border-radius:20px;cursor:pointer}
.info-stab.active{background:var(--orl);border-color:var(--or);color:var(--orb)}
.info-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--rad);padding:18px}
body.dark .info-card{background:var(--card);border-color:var(--brd)}
.info-title{font-size:15px;font-weight:800;color:var(--orb);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--or)}
.info-text{font-size:14px;color:var(--tx);line-height:1.75;white-space:pre-wrap;min-height:80px}
.info-ta{width:100%;min-height:180px;padding:10px;font-size:13px;line-height:1.7;border:1px solid var(--brd);border-radius:var(--rads);background:var(--bg);color:var(--tx);resize:vertical;font-family:inherit}
.info-ta:focus{outline:none;border-color:var(--or)}
.info-save{margin-top:8px;padding:7px 16px;background:var(--or);color:#fff;border:none;border-radius:var(--rads);font-size:12px;font-weight:700;cursor:pointer}
.img-drop{border:2px dashed var(--brd);border-radius:var(--rad);padding:24px;text-align:center;cursor:pointer;margin-top:10px;color:var(--tx3);font-size:13px}
.img-drop:hover{border-color:var(--or);color:var(--or)}
.empty-state{text-align:center;padding:20px;color:var(--tx3);font-size:13px}

.login-ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border-radius:var(--rad);padding:26px;width:100%;max-width:310px;border-top:4px solid var(--or)}
.login-logo{display:flex;justify-content:center;margin-bottom:14px}
.login-logo img{width:54px;height:54px;object-fit:contain}
.login-title{font-size:15px;font-weight:800;text-align:center;margin-bottom:3px}
.login-sub{font-size:12px;color:var(--tx2);text-align:center;margin-bottom:18px}
.login-in{width:100%;padding:9px 11px;border:1px solid var(--brd);border-radius:var(--rads);font-size:13px;background:var(--bg);color:var(--tx);margin-bottom:8px}
.login-in:focus{outline:none;border-color:var(--or)}
.login-btn{width:100%;padding:9px;background:var(--or);color:#fff;border:none;border-radius:var(--rads);font-size:13px;font-weight:800;cursor:pointer}
.login-btn:hover{background:var(--ord)}
.login-err{font-size:11px;color:#dc2626;margin-top:6px;text-align:center}
.cancel-lnk{display:block;text-align:center;margin-top:10px;font-size:12px;color:var(--tx3);cursor:pointer}

.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-card{background:var(--card);border-radius:var(--rad);padding:18px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;border-top:3px solid var(--or)}
.modal-title{font-size:14px;font-weight:800;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--brd);color:var(--orb)}
.modal-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:14px;padding-top:10px;border-top:1px solid var(--brd)}
.btn{padding:7px 14px;border-radius:var(--rads);font-size:12px;cursor:pointer;font-weight:700;border:1px solid var(--brd);background:var(--card);color:var(--tx)}
.btn:hover{background:var(--orl)}
.btn-p{background:var(--or);color:#fff;border-color:var(--or)}
.btn-p:hover{background:var(--ord)}
.te-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.te-in{flex:1;height:30px;padding:0 9px;font-size:13px;border:1px solid var(--brd);border-radius:var(--radi);background:var(--card);color:var(--tx)}
.te-in:focus{outline:none;border-color:var(--or)}
.mo-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #f3e8d8;font-size:12px}
.mo-row:last-child{border-bottom:none}
body.dark .mo-row{border-bottom-color:#2a1a0a}
.mv-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.mv-btn{font-size:10px;padding:1px 4px;border:1px solid var(--brd);border-radius:3px;cursor:pointer;background:var(--card)}
.mv-btn:hover{background:var(--orl);border-color:var(--or)}
</style>

// ── Firebase ──
let _savingUntil=0;
function r(path){return ref(db,path);}

function fset(path,val){
  _savingUntil=Date.now()+3000;
  showSav();
  return set(r(path),val).then(()=>{setTimeout(hideSav,800);}).catch(console.error);
}
function showSav(){const e=document.getElementById('sav');if(e){e.textContent='● Sauvegarde...';e.classList.add('show');}}
function hideSav(){const e=document.getElementById('sav');if(e){e.textContent='✓ Sauvegardé';setTimeout(()=>e.classList.remove('show'),1200);}}

function defGroup(tid,gid,order){
  const teams=(DEF_TEAMS[tid]||DEF_TEAMS.u11)[gid]||['A','B','C','D'];
  return{teams,matches:order.map(([h,a])=>({h,a,sh:-1,sa:-1})),tab:{},times:{},logos:{}};
}
function defTour(tid){
  const g={};
  GDM.forEach(gd=>{g[gd.id]=defGroup(tid,gd.id,MO_M);});
  GDA.forEach(gd=>{g[gd.id]={teams:['?','?','?','?'],matches:MO_A.map(([h,a])=>({h,a,sh:-1,sa:-1})),tab:{},times:{},logos:{}};});
  return{groups:g,finals:{}};
}

function initFB(){
  onValue(r('.info/connected'),s=>{S.conn=s.val()===true;render();});
  onValue(r('infos'),s=>{S.db.infos=s.val()||{};render();});
  TOURS.filter(t=>!t.info).forEach(t=>{
    onValue(r('tournaments/'+t.id),s=>{
      const v=s.val();
      if(!v){fset('tournaments/'+t.id,defTour(t.id));}
      else{
        if(!S.db.tours)S.db.tours={};
        if(Date.now()<_savingUntil)return; // ignore pendant la sauvegarde
        S.db.tours[t.id]=v;
        try{localStorage.setItem('cfc_db',JSON.stringify(S.db));}catch(e){}
        if(t.id===S.tid)render();
      }
    });
  });
}

// ── Data helpers ──
function tour(tid){return S.db.tours?.[tid]||defTour(tid);}
function grp(tid,gid){return tour(tid).groups?.[gid]||defGroup(tid,gid,MO_M);}
function teams(tid,gid){return grp(tid,gid).teams||['?','?','?','?'];}
function matches(tid,gid){const m=grp(tid,gid).matches;if(!m)return[];return Array.isArray(m)?m:Object.values(m);}
function times(tid,gid){return grp(tid,gid).times||{};}
function logos(tid){return S.db.tours?.[tid]?.logos||{};}

// ── Standings ──
function standings(tid,gid){
  const ts=teams(tid,gid);
  const ms=matches(tid,gid);
  const st=ts.map((n,i)=>({i,name:n,pts:0,bp:0,bc:0}));
  for(const m of ms){
    const forf=m.sh===-2||m.sa===-2;
    const ok=!forf&&m.sh>=0&&m.sa>=0;
    if(!forf&&!ok)continue;
    if(ok){st[m.h].bp+=m.sh;st[m.h].bc+=m.sa;st[m.a].bp+=m.sa;st[m.a].bc+=m.sh;}
    if(m.sh===-2){st[m.a].pts+=4;}
    else if(m.sa===-2){st[m.h].pts+=4;}
    else if(m.sh>m.sa){st[m.h].pts+=4;st[m.a].pts+=1;}
    else if(m.sh===m.sa){st[m.h].pts+=2;st[m.a].pts+=2;}
    else{st[m.a].pts+=4;st[m.h].pts+=1;}
  }
  return sortSt(st,tid,gid);
}
function gap(team,all,tid,gid){
  const tied=all.filter(t=>t.pts===team.pts);
  if(tied.length<=1)return 0;
  let bp=0,bc=0;
  for(const m of matches(tid,gid)){
    if(m.sh<0&&m.sa>=0)continue;
    if(m.sh<0||m.sa<0)continue;
    if(!tied.some(t=>t.i===m.h)||!tied.some(t=>t.i===m.a))continue;
    if(m.h===team.i){bp+=m.sh;bc+=m.sa;}
    if(m.a===team.i){bp+=m.sa;bc+=m.sh;}
  }
  return bp-bc;
}
function maxG(ti,tid,gid){
  let mx=0;
  for(const m of matches(tid,gid)){
    if(m.sh<0)continue;
    if(m.h===ti)mx=Math.max(mx,m.sh);
    if(m.a===ti)mx=Math.max(mx,m.sa);
  }
  return mx;
}
function sortSt(st,tid,gid){
  const tab=grp(tid,gid).tab||{};
  return[...st].sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const ga=gap(a,st,tid,gid),gb=gap(b,st,tid,gid);
    if(gb!==ga)return gb-ga;
    const da=a.bp-a.bc,db=b.bp-b.bc;
    if(db!==da)return db-da;
    if(b.bp!==a.bp)return b.bp-a.bp;
    const ma=maxG(a.i,tid,gid),mb=maxG(b.i,tid,gid);
    if(mb!==ma)return mb-ma;
    return(tab[a.i]||999)-(tab[b.i]||999);
  });
}
function isTied(team,sorted,tid,gid){
  const same=sorted.filter(t=>t.pts===team.pts);if(same.length<=1)return false;
  const myG=gap(team,sorted,tid,gid);
  const gT=same.filter(t=>gap(t,sorted,tid,gid)===myG);if(gT.length<=1)return false;
  const da=team.bp-team.bc;
  const dT=gT.filter(t=>(t.bp-t.bc)===da);if(dT.length<=1)return false;
  const bT=dT.filter(t=>t.bp===team.bp);if(bT.length<=1)return false;
  const mx=maxG(team.i,tid,gid);return bT.filter(t=>maxG(t.i,tid,gid)===mx).length>1;
}
function updateApm(tid){
  const st={};GDM.forEach(gd=>{st[gd.id]=standings(tid,gd.id);});
  const get=(gid,p)=>st[gid][p]?.name||'?';
  GDA.forEach(gd=>{
    const nt=gd.src.map(([g,p])=>get(g,p));
    const cur=grp(tid,gd.id);
    if(S.admin&&JSON.stringify(cur.teams)!==JSON.stringify(nt)){
      fset('tournaments/'+tid+'/groups/'+gd.id,{teams:nt,matches:MO_A.map(([h,a])=>({h,a,sh:-1,sa:-1})),tab:{},times:{},logos:{}});
    }
  });
}

function logoImg(lgos, name, side) {
  const key = name.replace(/[^a-zA-Z0-9]/g,'_');
  const src = lgos[key] || '';
  if (!src) return '';
  const ml = side==='l' ? '4px' : '0';
  const mr = side==='r' ? '4px' : '0';
  return '<img src="'+src+'" style="width:16px;height:16px;border-radius:3px;object-fit:contain;vertical-align:middle;margin-left:'+ml+';margin-right:'+mr+'" alt="">';
}

function buildGrid(tid,defs){
  let h=`<div class="groups-grid">`;
  defs.forEach(gd=>{h+=buildCard(tid,gd);});
  h+=`</div>`;
  return h;
}

function terrainOf(tid,gd){
  if(tid!=='u15')return gd.terrain;
  const map={G3M:'A',G4M:'B',GP1:'A',GP2:'B'};
  return map[gd.id]||gd.terrain;
}

function buildCard(tid,gd){
  const gid=gd.id;
  const ts=teams(tid,gid);
  const ms=matches(tid,gid);
  const tms=times(tid,gid);
  const lgos=logos(tid);
  const terrain=terrainOf(tid,gd);
  if(!ts||ts.every(t=>t==='?'))
    return`<div class="card"><div class="card-head"><span class="card-title">${gd.label}</span></div><div class="card-body"><div class="empty-state">⏳ En attente des qualifiés du matin</div></div></div>`;
  const sorted=standings(tid,gid);
  const needTab=sorted.some(t=>isTied(t,sorted,tid,gid));
  const tab=grp(tid,gid).tab||{};
  let h=`<div class="card"><div class="card-head">`;
  h+=`<div style="display:flex;align-items:center"><span class="card-title">${gd.label}</span><span class="terrain-badge">Terrain ${terrain}</span></div>`;
  h+=`<div class="card-actions">`;
  if(S.admin)h+=`<button class="icon-btn" onclick="openModal('teams','${tid}','${gid}')">✏ Équipes</button><button class="icon-btn" onclick="openModal('order','${tid}','${gid}')">⇅ Matchs</button>`;
  h+=`</div></div><div class="card-body">`;
  h+=`<table class="stand-table"><thead><tr><th width="20">#</th><th width="24"></th><th class="tl">Équipe</th><th width="22">J</th><th width="26">BP</th><th width="26">BC</th><th width="30">Diff</th><th width="30">PTS</th></tr></thead><tbody>`;
  sorted.forEach((t,rank)=>{
    if(rank===2)h+=`<tr class="qualify-sep"><td colspan="8"><div class="qualify-line"></div></td></tr>`;
    const played=ms.filter(m=>(m.h===t.i||m.a===t.i)&&(m.sh>=0||m.sh===-2||m.sa===-2)).length;
    const diff=t.bp-t.bc;
    const tied=isTied(t,sorted,tid,gid);
    const isMe=S.myTeam===t.name;
    const key=t.name.replace(/[^a-zA-Z0-9]/g,'_');
    const lsrc=lgos[key]||'';
    h+=`<tr style="${isMe?'background:var(--orl)':''}">`;
    h+=`<td class="pos-td"><span class="pos-num p${rank+1}">${rank+1}</span></td>`;
    if(S.admin){
      h+=`<td class="logo-td" style="text-align:center"><label style="cursor:pointer" title="Changer logo">`;
      h+=lsrc?`<img class="club-logo" src="${lsrc}" alt="">`:`<div class="logo-add">+</div>`;
      h+=`<input type="file" accept="image/*" style="display:none" data-tid="${tid}" data-k="${key}" onchange="upLogo(this)"></label></td>`;
    }else{
      h+=`<td class="logo-td" style="text-align:center">${lsrc?`<img class="club-logo" src="${lsrc}" alt="">`:''}</td>`;
    }
    h+=`<td class="tl team-name-td" onclick="setMyTeam('${t.name}')">${t.name}`;
    if(tied)h+=`<span class="tab-badge">TAB</span>`;
    if(isMe)h+=`<span class="my-badge">MOI</span>`;
    h+=`</td>`;
    h+=`<td>${played}</td><td>${t.bp}</td><td>${t.bc}</td>`;
    h+=`<td class="${diff>0?'diff-pos':diff<0?'diff-neg':''}">${diff>0?'+':''}${diff}</td>`;
    h+=`<td class="pts-td">${t.pts}</td></tr>`;
  });
  h+=`</tbody></table>`;
  if(needTab&&S.admin){
    h+=`<div class="tab-zone"><div class="tab-zone-title">Égalité parfaite — TAB (1 = meilleur)</div>`;
    sorted.filter(t=>isTied(t,sorted,tid,gid)).forEach(t=>{
      h+=`<div class="tab-row"><input class="tab-in" type="number" min="1" max="4" value="${tab[t.i]||''}" placeholder="—" data-tid="${tid}" data-gid="${gid}" data-ti="${t.i}" onchange="setTab(this)"><span>${t.name}</span></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="matches-section"><div class="sec-lbl">Rencontres</div>`;
  ms.forEach((m,mi)=>{
    const hn=ts[m.h]||'?',an=ts[m.a]||'?';
    const played=m.sh>=0||m.sh===-2||m.sa===-2;
    const t=tms[mi]||'';
    if(S.admin){
      const sh=m.sh>=0?m.sh:'',sa=m.sa>=0?m.sa:'';
      const forf=m.sh===-2||m.sa===-2;
      h+=`<div class="match-row match-edit">`;
      h+=`<input class="m-time-in" type="text" placeholder="10:00" maxlength="5" value="${t}" data-tid="${tid}" data-gid="${gid}" data-mi="${mi}" onchange="setTime(this)">`;
      h+=`<div class="m-team m-team-l">${hn+logoImg(lgos,hn,'l')}</div>`;
      h+=`<input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${sh}" placeholder="—" data-tid="${tid}" data-gid="${gid}" data-mi="${mi}" data-side="h" onchange="setScore(this)" ${m.sh===-2?'disabled style="opacity:.3"':''}>`;
      h+=`<div class="sep" style="display:flex;flex-direction:column;align-items:center;gap:1px">–${forf?'<span style="font-size:8px;color:var(--or);font-weight:700">FORF.</span>':''}</div>`;
      h+=`<input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${sa}" placeholder="—" data-tid="${tid}" data-gid="${gid}" data-mi="${mi}" data-side="a" onchange="setScore(this)" ${m.sa===-2?'disabled style="opacity:.3"':''}>`;

      h+=`<div class="m-team m-team-r">${logoImg(lgos,an,'r')+an}</div>`;
      h+=`</div>`;
    }else{
      const wl=played&&(m.sh>m.sa||m.sa===-2)&&m.sh!==-2;
      const wr=played&&(m.sa>m.sh||m.sh===-2)&&m.sa!==-2;
      h+=`<div class="match-row match-view">`;
      h+=`<div class="m-time">${t}</div>`;
      h+=`<div class="m-team m-team-l${wl?' win':''}${S.myTeam===hn?' mine':''}">${hn+logoImg(lgos,hn,'l')}</div>`;
      h+=`<div style="display:flex;flex-direction:column;align-items:center"><div class="score-box${!played?' np':''}">${played?(m.sh===-2?'0 – 3':m.sa===-2?'3 – 0':m.sh+' – '+m.sa):'à jouer'}</div>${(m.sh===-2||m.sa===-2)?'<span style="font-size:9px;color:var(--or);font-weight:700">Forfait</span>':''}</div>`;
      h+=`<div class="m-team m-team-r${wr?' win':''}${S.myTeam===an?' mine':''}">${logoImg(lgos,an,'r')+an}</div>`;
      h+=`</div>`;
    }
  });
  h+=`</div></div></div>`;
  return h;
}

function buildFinale(tid){
  const ast={};GDA.forEach(gd=>{ast[gd.id]=standings(tid,gd.id);});
  const get=(gid,p)=>ast[gid][p]?.name||'?';
  const F=tour(tid).finals||{};
  const FO=tour(tid).finalsOrder||null; // custom order/terrain overrides
  const lgos=logos(tid);

  const fd=fid=>F[fid]||{};
  const played=fid=>{const f=fd(fid);return f.sh!==undefined&&f.sa!==undefined;};
  const winner=fid=>{
    const f=fd(fid);if(!played(fid))return'?';
    if(f.sh>f.sa)return f.h;if(f.sa>f.sh)return f.a;
    if(f.ph!==undefined&&f.pa!==undefined)return f.ph>f.pa?f.h:f.a;
    return'?';
  };
  const loser=fid=>{
    const f=fd(fid);if(!played(fid))return'?';
    if(f.sh<f.sa)return f.h;if(f.sa<f.sh)return f.a;
    if(f.ph!==undefined&&f.pa!==undefined)return f.ph<f.pa?f.h:f.a;
    return'?';
  };

  // Default finale matches definition
  const defMatches=[
    // Vague 1 : Demis (A/B) + 13/14 et 15/16 (C/D) — même heure
    {id:'sf1', h:get('GV1',0),a:get('GV2',1),lbl:'Demi',        tr:'A'},
    {id:'sf2', h:get('GV2',0),a:get('GV1',1),lbl:'Demi',        tr:'B'},
    {id:'fin7',h:get('GP1',2),a:get('GP2',2),lbl:'13ème/14ème', tr:'C'},
    {id:'fin8',h:get('GP1',3),a:get('GP2',3),lbl:'15ème/16ème', tr:'D'},
    // Vague 2 : 5/6 et 7/8 (A/B) + 9/10 et 11/12 (C/D) — même heure
    {id:'fin3',h:get('GV1',2),a:get('GV2',2),lbl:'5ème/6ème',   tr:'A'},
    {id:'fin4',h:get('GV1',3),a:get('GV2',3),lbl:'7ème/8ème',   tr:'B'},
    {id:'fin5',h:get('GP1',0),a:get('GP2',0),lbl:'9ème/10ème',  tr:'C'},
    {id:'fin6',h:get('GP1',1),a:get('GP2',1),lbl:'11ème/12ème', tr:'D'},
    // Vague 3 : Petite finale (terrain selon catégorie) + Finale (A)
    {id:'fin2',h:loser('sf1'), a:loser('sf2'), lbl:'🥉 3ème/4ème', tr: tid==='u13'?'B':'A'},
    {id:'fin1',h:winner('sf1'),a:winner('sf2'),lbl:'🥇 1ère/2ème', tr:'A'},
  ];

  // Apply any saved overrides (terrain, time)
  const FMeta=tour(tid).finalsMeta||{};

  const bMatch=m=>{
    const f=fd(m.id);const p=played(m.id);
    const draw=p&&f.sh===f.sa;
    const phw=draw&&f.ph!==undefined&&f.ph>f.pa;
    const paw=draw&&f.pa!==undefined&&f.pa>f.ph;
    const hw=p&&(f.sh>f.sa||phw),aw=p&&(f.sa>f.sh||paw);
    const meta=FMeta[m.id]||{};
    const terrain=meta.tr||m.tr;
    const time=meta.time||'';
    const lh=lgos[m.h.replace(/[^a-zA-Z0-9]/g,'_')]||'';
    const la=lgos[m.a.replace(/[^a-zA-Z0-9]/g,'_')]||'';
    const logoH=lh?`<img src="${lh}" style="width:16px;height:16px;border-radius:3px;object-fit:contain;flex-shrink:0" alt="">`:''
    const logoA=la?`<img src="${la}" style="width:16px;height:16px;border-radius:3px;object-fit:contain;flex-shrink:0" alt="">`:''
    let h=`<div class="b-match">`;
    // Home team row
    h+=`<div class="b-team${hw?' win':''}">`;
    h+=`<span style="display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap;max-width:160px">${logoH}<span style="overflow:hidden;text-overflow:ellipsis">${m.h}</span></span>`;
    h+=S.admin?`<input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${p?f.sh:''}" placeholder="—" data-tid="${tid}" data-fid="${m.id}" data-fh="${m.h}" data-fa="${m.a}" data-side="h" onchange="setFS(this)" style="width:26px;height:24px;font-size:12px">`:`<span class="b-score">${p?f.sh:'–'}</span>`;
    h+=`</div>`;
    // Away team row
    h+=`<div class="b-team${aw?' win':''}">`;
    h+=`<span style="display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap;max-width:160px">${logoA}<span style="overflow:hidden;text-overflow:ellipsis">${m.a}</span></span>`;
    h+=S.admin?`<input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${p?f.sa:''}" placeholder="—" data-tid="${tid}" data-fid="${m.id}" data-fh="${m.h}" data-fa="${m.a}" data-side="a" onchange="setFS(this)" style="width:26px;height:24px;font-size:12px">`:`<span class="b-score">${p?f.sa:'–'}</span>`;
    h+=`</div>`;
    // Peno
    if(draw){
      h+=`<div class="peno-row"><span class="peno-lbl">Tirs au but :</span>`;
      h+=S.admin?`<input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${f.ph!==undefined?f.ph:''}" placeholder="—" data-tid="${tid}" data-fid="${m.id}" data-fh="${m.h}" data-fa="${m.a}" data-side="ph" onchange="setFS(this)" style="width:26px;height:24px;font-size:12px"><span style="color:var(--tx3)">–</span><input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${f.pa!==undefined?f.pa:''}" placeholder="—" data-tid="${tid}" data-fid="${m.id}" data-fh="${m.h}" data-fa="${m.a}" data-side="pa" onchange="setFS(this)" style="width:26px;height:24px;font-size:12px">`:`<span style="font-weight:700">${f.ph!==undefined?f.ph+'–'+f.pa:'à venir'}</span>`;
      h+=`</div>`;
    }
    // Label row: time + terrain + edit buttons if admin
    h+=`<div class="b-lbl" style="display:flex;align-items:center;justify-content:space-between;gap:6px">`;
    h+=`<span>${m.lbl}</span>`;
    h+=`<span style="display:flex;align-items:center;gap:5px">`;
    if(S.admin){
      h+=`<input type="text" value="${time}" placeholder="10:00" maxlength="5" data-tid="${tid}" data-fid="${m.id}" onchange="setFMeta(this,'time')" style="width:46px;height:20px;font-size:10px;border:1px solid var(--brd);border-radius:3px;background:var(--card);color:var(--tx);text-align:center">`;
      h+=`<input type="text" value="${terrain}" maxlength="1" data-tid="${tid}" data-fid="${m.id}" onchange="setFMeta(this,'tr')" style="width:22px;height:20px;font-size:10px;border:1px solid var(--or);border-radius:3px;background:var(--orl);color:var(--orb);text-align:center;font-weight:800">`;
    }else{
      if(time)h+=`<span style="font-size:10px;color:var(--tx3)">${time}</span>`;
      h+=`<span class="terrain-badge" style="font-size:9px;padding:1px 5px">Terrain ${terrain}</span>`;
    }
    h+=`</span></div></div>`;
    return h;
  };

  const anyP=defMatches.some(m=>played(m.id));

  let h=`<div style="display:grid;grid-template-columns:1fr${anyP?' 260px':''};gap:14px;align-items:start">`;
  h+=`<div>`;

  if(S.admin)h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:11px;color:var(--tx3)">Mode admin : modifiez l'heure et le terrain directement sur chaque match</span></div>`;

  const groups=[
    {title:'Demi-finales + Classement 13ème — 16ème',ids:['sf1','sf2','fin7','fin8']},
    {title:'Classement 5ème — 12ème',ids:['fin3','fin4','fin5','fin6']},
    {title:'Petite finale',ids:['fin2']},
    {title:'🥇 Finale',ids:['fin1']},
  ];
  groups.forEach(g=>{
    h+=`<div style="margin-bottom:14px"><div class="b-round-title">${g.title}</div><div class="b-grid">`;
    g.ids.forEach(id=>{
      const m=defMatches.find(x=>x.id===id);
      if(m)h+=bMatch(m);
    });
    h+=`</div></div>`;
  });

  if(S.admin)h+=`<button class="pdf-btn" onclick="window.print()">📄 Exporter PDF</button>`;
  h+=`</div>`;

  if(anyP){
    const clsMap=[
      [1,winner('fin1')],[2,loser('fin1')],[3,winner('fin2')],[4,loser('fin2')],
      [5,winner('fin3')],[6,loser('fin3')],[7,winner('fin4')],[8,loser('fin4')],
      [9,winner('fin5')],[10,loser('fin5')],[11,winner('fin6')],[12,loser('fin6')],
      [13,winner('fin7')],[14,loser('fin7')],[15,winner('fin8')],[16,loser('fin8')],
    ];
    const medals={1:'🥇',2:'🥈',3:'🥉'};
    h+=`<div class="card" style="position:sticky;top:14px"><div class="card-head"><span class="card-title">🏆 Classement final</span></div><div class="card-body" style="padding:0">`;
    clsMap.forEach(([pos,name])=>{
      const key=name.replace(/[^a-zA-Z0-9]/g,'_');
      const lsrc=lgos[key]||'';
      h+=`<div class="cls-row">`;
      h+=`<span class="cls-pos" style="color:${pos<=2?'var(--or)':pos<=4?'var(--tx2)':'var(--tx3)'}">${medals[pos]||pos}</span>`;
      h+=lsrc?`<img src="${lsrc}" style="width:16px;height:16px;border-radius:3px;object-fit:contain" alt="">`:'';
      h+=`<span class="cls-name" style="font-weight:${pos<=4?'600':'400'}">${name==='?'?'—':name}</span>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div>`;
  return h;
}

function buildInfos(){
  const sec=INFO_SECS.find(s=>s.id===S.infoSec)||INFO_SECS[0];
  const inf=S.db.infos||{};
  const content=inf[sec.id]||'';
  const imgData=inf['plan_img']||'';
  let h=`<div class="info-stabs">`;
  INFO_SECS.forEach(s=>{h+=`<button class="info-stab${s.id===S.infoSec?' active':''}" onclick="setInfoSec('${s.id}')">${s.icon} ${s.label}</button>`;});
  h+=`</div><div class="info-card"><div class="info-title">${sec.icon} ${sec.label}</div>`;
  if(S.admin){
    h+=`<textarea class="info-ta" id="info-ta" placeholder="${sec.ph}">${content}</textarea>`;
    if(sec.id==='plan'){
      h+=`<div class="img-drop" onclick="document.getElementById('plan-img-in').click()">`;
      if(imgData)h+=`<img src="${imgData}" alt="Plan" style="max-width:100%;border-radius:var(--rads)">`;
      else h+=`📎 Cliquer pour ajouter une image du plan`;
      h+=`</div><input type="file" id="plan-img-in" accept="image/*" style="display:none" onchange="upPlan(this)">`;
    }
    h+=`<button class="info-save" onclick="saveInfo('${sec.id}')">Enregistrer</button>`;
  }else{
    if(content)h+=`<div class="info-text">${content}</div>`;
    else h+=`<div style="color:var(--tx3);font-size:13px;padding:20px 0;text-align:center">Aucune information pour le moment</div>`;
    if(sec.id==='plan'&&imgData)h+=`<img src="${imgData}" alt="Plan" style="max-width:100%;border-radius:var(--rads);margin-top:12px">`;
  }
  h+=`</div>`;
  return h;
}

function buildMyTeamBar(tid){
  if(!S.myTeam)return'';
  const allG=[...GDM,...GDA];
  let next=null,stand=null;
  allG.forEach(gd=>{
    const ts=teams(tid,gd.id);
    const idx=ts.indexOf(S.myTeam);
    if(idx<0)return;
    const ms=matches(tid,gd.id);
    const tms2=times(tid,gd.id);
    const srt=standings(tid,gd.id);
    const pos=srt.findIndex(t=>t.name===S.myTeam);
    if(pos>=0)stand={group:gd.label,pos:pos+1,terrain:gd.terrain};
    ms.forEach((m,mi)=>{
      if((m.h===idx||m.a===idx)&&m.sh<0&&m.sa<0&&!next){
        next={opp:m.h===idx?ts[m.a]:ts[m.h],time:tms2[mi]||'',terrain:gd.terrain||'?'};
      }
    });
  });
  return`<div class="myteam-bar">
    <strong>${S.myTeam}</strong>
    ${stand?`<span>· ${stand.pos}${stand.pos===1?'er':'ème'} du ${stand.group} · Terrain ${stand.terrain}</span>`:''}
    ${next?`<span>· ⚽ Prochain : vs <strong>${next.opp}</strong>${next.time?' à '+next.time:''} · Terrain ${next.terrain}</span>`:'<span>· Tous les matchs joués ✓</span>'}
    <span class="myteam-close" onclick="setMyTeam(null)">✕</span>
  </div>`;
}

function renderModal(){
  document.querySelector('.modal-ov')?.remove();
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  const{type,tid,gid}=S.modal;
  const ts=teams(tid,gid);const ms=matches(tid,gid);const tms=times(tid,gid);const lgos=logos(tid);
  const gd=[...GDM,...GDA].find(d=>d.id===gid);
  const isApm=GDA.some(d=>d.id===gid);
  if(type==='teams'){
    let inner=`<div class="modal-card"><div class="modal-title">✏ Équipes — ${gd.label}</div>`;
    ts.forEach((t,i)=>{inner+=`<div class="te-row"><span style="font-size:11px;color:var(--tx3);width:14px;font-weight:800">${i+1}</span><input class="te-in" id="te-${i}" type="text" value="${t}" placeholder="Nom équipe"></div>`;});
    // Si c'est un groupe de l'après-midi, afficher les classements du matin en référence
    if(isApm){
      inner+=`<div style="margin-top:14px;border-top:1px solid var(--brd);padding-top:10px"><div style="font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📋 Classements du matin (référence)</div>`;
      GDM.forEach(gmatin=>{
        const srt=standings(tid,gmatin.id);
        inner+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:var(--orb);margin-bottom:3px">${gmatin.label} — Terrain ${gmatin.terrain}</div>`;
        srt.forEach((t,rank)=>{
          const pos=rank+1;
          const lbl=pos===1?'1er':pos+'ème';
          inner+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px">
            <span style="min-width:28px;font-weight:700;color:${rank<2?'var(--ord)':'var(--tx3)'}">${lbl}</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:${rank<2?'600':'400'}">${t.name}</span>
            <span style="font-size:10px;color:var(--tx3)">${t.pts}pts · ${t.bp}-${t.bc}</span>
          </div>`;
        });
        inner+=`</div>`;
      });
      inner+=`</div>`;
    }
    inner+=`<div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveTeams('${tid}','${gid}')">Enregistrer</button></div></div>`;
    ov.innerHTML=inner;
  }else if(type==='order'){
    let inner=`<div class="modal-card"><div class="modal-title">⇅ Ordre des matchs — ${gd.label}</div>`;
    ms.forEach((m,mi)=>{
      const hn=ts[m.h]||'?',an=ts[m.a]||'?';
      const sh=m.sh>=0?m.sh:'',sa=m.sa>=0?m.sa:'';
      const t=tms[mi]||'';
      inner+=`<div class="mo-row">
        <span style="font-size:10px;color:var(--tx3);min-width:14px;font-weight:800">${mi+1}</span>
        <div class="mv-btns">
          ${mi>0?`<button class="mv-btn" onclick="moveM('${tid}','${gid}',${mi},-1)">▲</button>`:`<span></span>`}
          ${mi<ms.length-1?`<button class="mv-btn" onclick="moveM('${tid}','${gid}',${mi},1)">▼</button>`:`<span></span>`}
        </div>
        <input class="m-time-in" type="text" placeholder="10:00" maxlength="5" value="${t}" data-tid="${tid}" data-gid="${gid}" data-mi="${mi}" onchange="setTime(this)" style="width:46px">
        <div style="flex:1;text-align:right;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${hn}</div>
        <input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${sh}" placeholder="—" data-tid="${tid}" data-gid="${gid}" data-mi="${mi}" data-side="h" onchange="setScore(this)" style="width:26px;height:24px;font-size:11px">
        <span style="color:var(--tx3);font-size:11px">–</span>
        <input class="s-in" type="text" inputmode="numeric" pattern="[0-9]*" value="${sa}" placeholder="—" data-tid="${tid}" data-gid="${gid}" data-mi="${mi}" data-side="a" onchange="setScore(this)" style="width:26px;height:24px;font-size:11px">
        <div style="flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${an}</div>
      </div>`;
    });
    inner+=`<div class="modal-actions"><button class="btn" onclick="resetOrder('${tid}','${gid}')">Réinitialiser</button><button class="btn btn-p" onclick="closeModal()">Fermer</button></div></div>`;
    ov.innerHTML=inner;
  }
  document.body.appendChild(ov);
}

// ── Actions ──
window.setTour=tid=>{S.tid=tid;render();};
window.setSess=s=>{S.sess=s;render();};
window.closeModal=()=>{S.modal=null;render();};
window.openModal=(type,tid,gid)=>{S.modal={type,tid,gid};render();};
window.setMyTeam=n=>{S.myTeam=S.myTeam===n?null:n;render();};
window.setInfoSec=id=>{S.infoSec=id;render();};
window.toggleDark=()=>{S.dark=!S.dark;document.body.classList.toggle('dark',S.dark);localStorage.setItem('cfc_dark',S.dark?'1':'0');render();};
window.doShare=()=>{
  const url=window.location.href;
  if(navigator.share){navigator.share({title:'Tournois CFC',url});}
  else{navigator.clipboard.writeText(url).then(()=>{
    const t=document.createElement('div');t.className='share-toast';t.textContent='✓ Lien copié !';
    document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
  });}
};
window.setScore=el=>{
  const{tid,gid,mi,side}=el.dataset;
  const val=el.value===''?-1:parseInt(el.value);
  const ms=[...matches(tid,gid)];const idx=parseInt(mi);
  ms[idx]={...ms[idx],[side==='h'?'sh':'sa']:val};
  fset('tournaments/'+tid+'/groups/'+gid+'/matches/'+idx,ms[idx]);
};
window.setFS=el=>{
  const{tid,fid,side,fh,fa}=el.dataset;
  const val=el.value===''?undefined:parseInt(el.value);
  const F=tour(tid).finals||{};
  const cur=F[fid]||{h:fh,a:fa};
  fset('tournaments/'+tid+'/finals/'+fid,{...cur,[side==='h'?'sh':side==='a'?'sa':side==='ph'?'ph':'pa']:val});
};
window.setTab=el=>{
  const{tid,gid,ti}=el.dataset;
  fset('tournaments/'+tid+'/groups/'+gid+'/tab/'+ti,parseInt(el.value)||0);
};
window.setTime=el=>{
  const{tid,gid,mi}=el.dataset;
  fset('tournaments/'+tid+'/groups/'+gid+'/times/'+mi,el.value);
};
window.togForf=el=>{
  const{tid,gid,mi}=el.dataset;
  const ms=[...matches(tid,gid)];const idx=parseInt(mi);const m=ms[idx];
  const ts=teams(tid,gid);
  if(m.sh===-2||m.sa===-2){ms[idx]={...m,sh:-1,sa:-1};}
  else{
    const c=confirm('Forfait de '+ts[m.h]+' ? OK='+ts[m.h]+' / Annuler='+ts[m.a]);
    // équipe forfait reçoit -2, adversaire gagne 3-0
    ms[idx]={...m,sh:c?-2:3,sa:c?3:-2};
  }
  fset('tournaments/'+tid+'/groups/'+gid+'/matches/'+idx,ms[idx]);
};
window.saveTeams=(tid,gid)=>{
  const inputs=document.querySelectorAll('[id^="te-"]');
  const nt=[];inputs.forEach(inp=>nt.push(inp.value.trim()||'?'));
  if(!S.db.tours)S.db.tours={};
  if(!S.db.tours[tid])S.db.tours[tid]={groups:{},finals:{}};
  if(!S.db.tours[tid].groups)S.db.tours[tid].groups={};
  const existing=S.db.tours[tid].groups[gid]||{};
  // On ne réinitialise PAS les matches/tab/times — on garde les scores existants
  S.db.tours[tid].groups[gid]={...existing,teams:nt};
  S.modal=null;
  render();
  // Un seul fset sur le groupe entier pour éviter les race conditions
  fset('tournaments/'+tid+'/groups/'+gid,S.db.tours[tid].groups[gid]);
};
window.moveM=(tid,gid,mi,dir)=>{
  const ms=[...matches(tid,gid)];const ni=mi+dir;
  if(ni<0||ni>=ms.length)return;
  [ms[mi],ms[ni]]=[ms[ni],ms[mi]];
  fset('tournaments/'+tid+'/groups/'+gid+'/matches',ms);
  S.modal={type:'order',tid,gid};render();
};
window.resetOrder=(tid,gid)=>{
  const isApm=GDA.some(d=>d.id===gid);
  const order=isApm?MO_A:MO_M;
  const ms=matches(tid,gid);
  const sc={};ms.forEach(m=>{sc[m.h+'-'+m.a]={sh:m.sh,sa:m.sa};});
  fset('tournaments/'+tid+'/groups/'+gid+'/matches',order.map(([h,a])=>{const s=sc[h+'-'+a]||sc[a+'-'+h]||{sh:-1,sa:-1};return{h,a,sh:s.sh,sa:s.sa};}));
  S.modal={type:'order',tid,gid};render();
};
window.saveInfo=id=>{
  const val=document.getElementById('info-ta')?.value||'';
  fset('infos/'+id,val);
  if(!S.db.infos)S.db.infos={};S.db.infos[id]=val;render();
};
window.upPlan=inp=>{
  const file=inp.files[0];if(!file)return;
  const rd=new FileReader();rd.onload=e=>{fset('infos/plan_img',e.target.result);};rd.readAsDataURL(file);
};
window.upLogo=inp=>{
  const{tid,k}=inp.dataset;const file=inp.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');cv.width=64;cv.height=64;
      cv.getContext('2d').drawImage(img,0,0,64,64);
      fset('tournaments/'+tid+'/logos/'+k,cv.toDataURL('image/png',0.8));
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
};
window.showLogin=()=>{
  const ov=document.createElement('div');ov.className='login-ov';
  ov.innerHTML=`<div class="login-card">
    <div class="login-logo"><img src="${window.LOGO_SRC}" alt="CFC"></div>
    <div class="login-title">Accès administrateur</div>
    <div class="login-sub">Charleval Football Club</div>
    <input class="login-in" type="password" id="pw" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Se connecter</button>
    <div class="login-err" id="pw-err"></div>
    <span class="cancel-lnk" onclick="this.closest('.login-ov').remove()">Annuler</span>
  </div>`;
  document.body.appendChild(ov);ov.querySelector('#pw').focus();
};
window.tryLogin=()=>{
  if(document.getElementById('pw').value===PASS){S.admin=true;document.querySelector('.login-ov')?.remove();render();}
  else document.getElementById('pw-err').textContent='Mot de passe incorrect';
};
window.logout=()=>{S.admin=false;render();};
window.setFMeta=(el,field)=>{
  const{tid,fid}=el.dataset;
  fset('tournaments/'+tid+'/finalsMeta/'+fid+'/'+field,el.value);
};

// Boot
window.addEventListener('error', e => {
  document.getElementById('app').innerHTML = 
    '<div style="padding:40px;text-align:center;font-family:sans-serif">' +
    '<img src="' + window.LOGO_SRC + '" style="width:60px;margin-bottom:16px"><br>' +
    '<strong style="color:#E8650A">Erreur de chargement</strong><br>' +
    '<span style="color:#888;font-size:13px">' + e.message + '</span><br><br>' +
    '<button onclick="location.reload()" style="padding:8px 16px;background:#E8650A;color:#fff;border:none;border-radius:6px;cursor:pointer">Recharger</button>' +
    '</div>';
});
document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px"><img src="${window.LOGO_SRC}" style="width:60px;height:60px;object-fit:contain"><div style="font-size:13px;color:#a07850">Connexion en cours...</div></div>`;
if(localStorage.getItem('cfc_dark')==='1'){S.dark=true;document.body.classList.add('dark');}
try{const cached=localStorage.getItem('cfc_db');if(cached){S.db=JSON.parse(cached);render();}}catch(e){}
try {
  initFB();
} catch(e) {
  document.getElementById('app').innerHTML = 
    '<div style="padding:40px;text-align:center;font-family:sans-serif">' +
    '<strong style="color:#E8650A">Erreur Firebase : </strong>' + e.message +
    '<br><br><button onclick="location.reload()" style="padding:8px 16px;background:#E8650A;color:#fff;border:none;border-radius:6px;cursor:pointer">Recharger</button></div>';
}
</script>
</body>
